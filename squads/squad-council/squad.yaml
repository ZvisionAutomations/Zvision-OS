quality_standards:
  reference_authors:
    - "Ray Dalio (Principles, Changing World Order)"
    - "Charlie Munger (Poor Charlie's Almanack, Latticework of Mental Models)"
    - "Naval Ravikant (Almanack of Naval Ravikant)"
    - "Peter Thiel (Zero to One)"
    - "Reid Hoffman (Blitzscaling, The Alliance, The Start-Up of You)"
    - "Simon Sinek (Start With Why, The Infinite Game, Leaders Eat Last)"
    - "Brene Brown (Dare to Lead, Daring Greatly, Rising Strong)"
    - "Patrick Lencioni (Five Dysfunctions, The Advantage, Working Genius)"
    - "Derek Sivers (Anything You Want, Hell Yeah or No, Useful Not Famous)"
    - "Yvon Chouinard (Let My People Go Surfing)"

  core_concepts:
    - name: "Principles-Based Decision Making"
      description: "Converter experiencia em regras explicitas que conectam valores a acoes (Dalio)"
    - name: "Latticework of Mental Models"
      description: "Resolver problemas aplicando modelos de multiplas disciplinas simultaneamente (Munger)"
    - name: "Specific Knowledge + Leverage"
      description: "Criar riqueza combinando conhecimento unico com alavancagem (Naval)"
    - name: "Zero to One"
      description: "Criar algo novo vs copiar o existente — monopolio vs competicao (Thiel)"
    - name: "Blitzscaling"
      description: "Priorizar velocidade sobre eficiencia em mercados winner-take-most (Hoffman)"
    - name: "Start With Why"
      description: "Liderar pela inspiracao, nao manipulacao — Golden Circle (Sinek)"
    - name: "Dare to Lead"
      description: "Vulnerabilidade como medida de coragem na lideranca (Brown)"
    - name: "Organizational Health"
      description: "Saude organizacional como vantagem competitiva definitiva (Lencioni)"
    - name: "Hell Yeah or No"
      description: "Se nao e um sim entusiastico, e um nao (Sivers)"
    - name: "Purpose Over Profit"
      description: "Negocios como ferramenta para proteger o planeta (Chouinard)"

cross_squad_handoffs:
  inbound:
    - from: squad-product
      receives: "Product strategy questions, roadmap decisions, feature prioritization"
    - from: squad-commercial
      receives: "Business model decisions, pricing strategy, market entry"
    - from: squad-finance
      receives: "Investment decisions, capital allocation, financial modeling"
    - from: squad-growth
      receives: "Growth strategy questions, scaling decisions"

  outbound:
    - to: squad-product
      sends: "Strategic direction, product vision, competitive positioning"
    - to: squad-commercial
      sends: "Business model recommendations, pricing philosophy, go-to-market strategy"
    - to: squad-finance
      sends: "Investment thesis, risk frameworks, portfolio strategy"
    - to: squad-growth
      sends: "Growth philosophy, scaling vs restraint recommendations"

preferences:
  file: preferences/README.md
