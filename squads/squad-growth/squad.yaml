quality_standards:
  reference_authors:
    - "Sean Ellis (Hacking Growth)"
    - "Andrew Chen (The Cold Start Problem)"
    - "Alistair Croll & Benjamin Yoskovitz (Lean Analytics)"
    - "Eric Ries (The Lean Startup)"
    - "Nir Eyal (Hooked)"
    - "Brian Balfour (Reforge Growth Series)"
    - "Casey Winters (Growth Models)"
    - "Elena Verna (Product-Led Growth)"
    - "Rand Fishkin (Lost and Founder, Moz)"
    - "Avinash Kaushik (Web Analytics 2.0)"
    - "Edward Tufte (The Visual Display of Quantitative Information)"
    - "Cole Nussbaumer Knaflic (Storytelling with Data)"
    - "Ron Kohavi (Trustworthy Online Controlled Experiments)"
    - "Stefan Thomke (Experimentation Works)"
    - "John Caples (Tested Advertising Methods)"

  reference_companies:
    - "Google (GA4, Search Console, Optimize)"
    - "Meta (Conversion API, Attribution)"
    - "Amplitude (Product Analytics)"
    - "Mixpanel (Event Analytics)"
    - "Segment (CDP)"
    - "Optimizely (Experimentation Platform)"
    - "VWO (CRO Platform)"
    - "Ahrefs/Semrush (SEO Tools)"
    - "Hotjar (Behavioral Analytics)"
    - "Looker/Metabase (BI Dashboards)"
    - "HubSpot (Growth Marketing)"
    - "Stripe (Revenue Analytics)"

  core_concepts:
    - name: "AARRR (Pirate Metrics)"
      description: "Acquisition → Activation → Retention → Revenue → Referral funnel"
    - name: "North Star Metric"
      description: "Single metric that best captures core value delivered to customers"
    - name: "Statistical Significance"
      description: "p-value < 0.05, 95% confidence interval for experiment decisions"
    - name: "Multi-Touch Attribution"
      description: "Distribuicao de credito entre touchpoints no customer journey"
    - name: "Growth Loops"
      description: "Self-reinforcing cycles that compound growth over time"

  mandatory_gates:
    - name: "Data Quality Gate"
      description: "Tracking accuracy >= 98%, no missing critical events"
      blocking: true
      agent: ga-analytics-engineer

    - name: "Statistical Validity Gate"
      description: "Experiments must reach statistical significance before decisions"
      blocking: true
      agent: ga-cro-specialist

cross_squad_handoffs:
  inbound:
    - from: squad-design
      receives: "Implemented pages, performance metrics, component analytics hooks"
    - from: squad-content
      receives: "Content assets, content performance data, editorial calendar"
    - from: squad-brand
      receives: "Brand guidelines for campaign creatives, messaging framework"
    - from: squad-copy
      receives: "Landing page copy, CTAs, email sequences for campaigns"

  outbound:
    - to: squad-design
      sends: "Analytics requirements, tracking specs, heatmap insights for UX"
    - to: squad-content
      sends: "Content performance data, SEO keyword opportunities, top content"
    - to: squad-copy
      sends: "CRO insights, winning copy variants, conversion data"
    - to: squad-commercial
      sends: "Lead scoring data, conversion analytics, pipeline metrics"
    - to: squad-product
      sends: "Product analytics, feature adoption data, user behavior insights"

preferences:
  file: preferences/README.md
