name: squad-research
version: 1.0.0
description: >
  Squad de classe mundial para pesquisa e inteligencia estrategica.
  7 agentes especialistas cobrindo 100% do ciclo de investigacao:
  deep research multi-fonte, inteligencia de audiencia, analise competitiva,
  sizing de mercado, sintese de dados e forecasting de tendencias.
  Core concepts: Research Depth Pyramid (4 niveis de profundidade),
  Insight Crystallization Engine (dado → insight → acao),
  Source Credibility Matrix (5 tiers de credibilidade).
  Absorve V1-Research + V2-DeepResearch + V2-AudienceIntel.
  Atemporal, parametrizavel para qualquer cliente/projeto/industria.
