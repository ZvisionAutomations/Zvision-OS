# ══════════════════════════════════════════════════════════════════════════════
# CORE CONCEPTS — Diferenciais Metodologicos
# ══════════════════════════════════════════════════════════════════════════════

core_concepts:
  research_depth_pyramid:
    description: >
      Framework de 4 niveis de profundidade de pesquisa.
      Cada nivel define escopo, tempo, fontes e formato de entrega.
      Nivel certo para cada situacao evita over-research e under-research.
    levels:
      - name: "SCAN"
        depth: 1
        time: "15-30 min"
        sources: "2-3 fontes, Tier 3-5"
        output: "Resumo executivo 1 pagina"
        when: "Orientacao rapida, triagem de oportunidade"
      - name: "ANALYZE"
        depth: 2
        time: "1-3 horas"
        sources: "5-8 fontes, Tier 2-4"
        output: "Relatorio estruturado 3-5 paginas"
        when: "Decisao tatica, validacao de hipotese"
      - name: "DEEP DIVE"
        depth: 3
        time: "4-8 horas"
        sources: "10-15 fontes, Tier 1-3"
        output: "Dossie completo 10-20 paginas"
        when: "Decisao estrategica, novo mercado, investimento"
      - name: "DEFINITIVE"
        depth: 4
        time: "Multi-dia"
        sources: "20+ fontes, todos os Tiers"
        output: "Pesquisa publicavel 30+ paginas"
        when: "Thought leadership, repositionamento, M&A due diligence"

  insight_crystallization_engine:
    description: >
      Motor que transforma dados brutos em insights acionaveis.
      Cada insight DEVE conter 3 componentes: FINDING + IMPLICATION + RECOMMENDATION.
      Sem os 3, nao e um insight — e apenas um dado.
    components:
      - name: "FINDING"
        role: "O que foi descoberto (dado + evidencia)"
        example: "73% dos compradores B2B consultam 3+ fornecedores antes de decidir"
      - name: "IMPLICATION"
        role: "O que isso significa para o negocio (so what?)"
        example: "Se nao estamos entre os 3 primeiros consultados, perdemos antes de competir"
      - name: "RECOMMENDATION"
        role: "O que fazer com isso (now what?)"
        example: "Investir em thought leadership para garantir presenca no consideration set"

  source_credibility_matrix:
    description: >
      Classificacao de fontes em 5 tiers de credibilidade.
      Toda pesquisa DEVE citar fontes com tier classificado.
      Pesquisas de nivel DEEP DIVE+ exigem maioria Tier 1-2.
    tiers:
      - tier: 1
        name: "Primaria"
        examples: "Dados proprios, surveys, entrevistas, experimentos, dados internos"
        reliability: "Maxima — dados de primeira mao"
      - tier: 2
        name: "Academica"
        examples: "Peer-reviewed journals, meta-analises, pesquisas publicadas"
        reliability: "Alta — metodologia rigida, revisao por pares"
      - tier: 3
        name: "Industria"
        examples: "McKinsey, Gartner, Forrester, BCG, relatórios de analistas"
        reliability: "Alta — expertise setorial, mas com potencial vies de venda"
      - tier: 4
        name: "Mercado"
        examples: "Trade publications, midia especializada, reportagens, blogs de autoridade"
        reliability: "Media — curadoria variavel, verificar contra Tier 1-3"
      - tier: 5
        name: "Social"
        examples: "Social listening, forums, reviews, comentarios, Reddit"
        reliability: "Baixa isolada — util para sentimento, nao para fatos"

