name: tier2-consultant
version: "1.0"
description: "Pipeline mid-tier — gera KBs + agente consultor (30-100K palavras, 1-2 sessoes)"
trigger: "Clone com content class A/B e confidence >= 75%"
agents_involved:
  - cloning-orqx
  - source-hunter
  - content-capturer
  - cognitive-extractor
  - mind-synthesizer
  - agent-forger
  - kb-architect

phases:
  - name: "Phase 1: Source Discovery"
    agent: source-hunter
    tasks:
      - discover-youtube-channels
      - discover-podcasts-appearances
      - discover-books-publications
      - discover-articles-interviews
      - discover-social-media-content
      - compile-source-catalog
      - estimate-content-volume
    output: "source-catalog.yaml"
    quality_gate: "Min 30K palavras, content class A ou B"

  - name: "Phase 2: Content Capture"
    agent: content-capturer
    depends_on: ["Phase 1"]
    tasks:
      - transcribe-youtube-videos
      - transcribe-podcast-episodes
      - extract-book-content
      - capture-article-text
      - normalize-raw-content
      - validate-transcription-quality
    output: "raw/ normalizado"
    quality_gate: "Transcricoes validadas"

  - name: "Phase 3: Cognitive Extraction"
    agent: cognitive-extractor
    depends_on: ["Phase 2"]
    tasks:
      - extract-mental-models
      - extract-heuristics
      - extract-decision-patterns
      - extract-vocabulary-tone
      - extract-workflows-processes
      - identify-contradictions
      - tag-confidence-levels
      - generate-extraction-report
    output: "5 camadas DNA"
    quality_gate: "Min Tier 2 requirements met"

  - name: "Phase 4: Synthesis"
    agent: mind-synthesizer
    depends_on: ["Phase 3"]
    tasks:
      - resolve-contradictions
      - build-cognitive-profile
      - identify-meta-patterns
      - calculate-confidence-score
      - determine-clone-tier
    output: "cognitive-profile.md"
    quality_gate: "Confidence >= 75%"

  - name: "Phase 5: Agent Generation"
    agent: agent-forger
    depends_on: ["Phase 4"]
    tasks:
      - generate-agent-persona
      - generate-agent-heuristics
      - generate-agent-protocols
      - generate-agent-commands
      - validate-agent-completeness
    output: "agent.md"
    quality_gate: "SQUAD-CREATION-STANDARDS compliance"

  - name: "Phase 6: KB Generation"
    agent: kb-architect
    depends_on: ["Phase 4"]
    tasks:
      - design-kb-taxonomy
      - generate-framework-kbs
      - generate-pattern-kbs
      - generate-methodology-kbs
      - validate-kb-citations
      - cross-reference-kbs
    output: "5+ KBs"
    quality_gate: "Min 5 KBs, citacoes validadas"

completion:
  notification: "cloning-orqx"
  message: "Workflow concluido com sucesso."
