quality_standards:
  reference_authors:
    - Robert C. Martin (Clean Code, SOLID principles)
    - Martin Fowler (Refactoring, Patterns of Enterprise Application Architecture)
    - Kent Beck (Test-Driven Development, Extreme Programming)
    - Addy Osmani (JavaScript performance, web performance patterns)
    - Lea Verou (CSS, web standards, progressive enhancement)
    - Jake Archibald (Web performance, service workers, progressive web apps)
    - Ilya Grigorik (High Performance Browser Networking)
    - Evan You (Reactive systems, modern frontend architecture)
    - Rich Harris (Svelte, compiler-first thinking, no-build tooling)
    - DHH (Rails doctrine, convention over configuration, majestic monolith)

  reference_companies:
    - Vercel (DX excellence, zero-config deployment)
    - Netlify (JAMstack, modern web infrastructure)
    - Linear (product quality, design-engineering collaboration)
    - Basecamp/37signals (simplicity, no-BS software development)
    - Stripe (API design excellence, developer experience)

  core_concepts:
    - name: "Clean Code First"
      description: >
        Todo código deve ser legível, testável e mantível antes de ser otimizado.
        Nomenclatura clara, funções pequenas com responsabilidade única, sem comentários
        desnecessários — o código comunica a intenção. Regra de ouro: se precisa
        de um comentário para explicar o que faz, reescreve.

    - name: "CSS Variables Only"
      description: >
        NUNCA valores crus de cor, espaçamento ou tipografia no CSS — sempre
        variáveis CSS (custom properties). Sistema de design tokens definido
        em :root. Qualquer valor hardcoded é um bug de design system.
        Referência: var(--color-primary), var(--space-4), var(--font-size-lg).

    - name: "Zero TypeScript any"
      description: >
        Quando TypeScript é usado, o tipo `any` é proibido sem exceção.
        Tipos devem ser explícitos, genéricos quando necessário, e nunca
        escapados via any. Se não sabe o tipo, investiga — não escapa.

    - name: "Security by Default"
      description: >
        Segurança não é feature — é requisito. XSS, SQL injection, CSRF, secrets
        expostos: qualquer vulnerabilidade bloqueia o deploy. O @security-dev
        revisa todo código antes de @devops fazer push. OWASP Top 10 é o checklist mínimo.

    - name: "Ship First, Optimize Later"
      description: >
        Versão funcional antes de versão perfeita. YAGNI (You Ain't Gonna Need It)
        e KISS (Keep It Simple, Stupid) governam decisões de arquitetura. Não
        antecipa requisitos futuros — entrega o que foi pedido, world-class,
        sem especulação.

