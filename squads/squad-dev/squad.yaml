name: squad-dev
version: "1.0.0"
slashPrefix: dev
author: Zvision
license: UNLICENSED
description: >
  Squad de desenvolvimento de software world-class — implementa sites, landing pages,
  features, componentes e APIs usando Vanilla HTML/CSS/JS, Node.js e Vercel.
  Zero mediocria: cada linha de código passa por arquitetura sólida, QA rigoroso
  e auditoria de segurança antes de ir ao ar.

