# ══════════════════════════════════════════════════════════════════════════════
# SQUAD MANIFEST — squad-content v1.0
# ══════════════════════════════════════════════════════════════════════════════
# The world-class content intelligence squad for detecting signals, planning
# editorially, structuring narratives, producing content at scale, adapting
# natively per platform, auditing quality, and measuring performance.
# 7 agents | 90 tasks | 6 workflows | 16 KBs | 7 templates | Full coverage
# ══════════════════════════════════════════════════════════════════════════════

name: squad-content
version: 1.0.0
description: >
  Squad de classe mundial para inteligencia de conteudo: deteccao de sinais em
  tempo real, planejamento editorial estrategico, producao de conteudo em escala
  com Espinha Dorsal (tese-mecanismo-prova-direcao), adaptacao nativa por
  plataforma com Template Contract System, auditoria de qualidade, medicao de
  performance e retroalimentacao sistemica. 7 agentes especialistas cobrindo
  100% do pipeline content ops world-class. Parametrizavel para qualquer cliente,
  qualquer plataforma, qualquer idioma. Atemporal e reutilizavel.
author: Caio Imori
license: UNLICENSED
slashPrefix: SINAPSE

metadata:
  created_at: "2026-03-13"
  updated_at: "2026-03-13"
  created_by: "squad-creator (Craft)"
  quality_target: "5.0/5.0 em todas as dimensoes"
  agents_count: 7
  tasks_count: 90
  knowledge_bases_count: 16
  checklists_count: 3
  templates_count: 7
  workflows_count: 6
  total_files: 130

# ══════════════════════════════════════════════════════════════════════════════
# QUALITY STANDARDS — Regras de Robustez (v1.0)
# ══════════════════════════════════════════════════════════════════════════════

quality_standards:
  robustness:
    min_agents: 6
    min_tasks: 50
    min_workflows: 3
    min_knowledge_bases: 8
    min_checklists: 2
    min_templates: 3
    world_class_references: required
    gap_audit: required
    preference_tracking: required

  references:
    authors:
      # Content Strategy
      - "Joe Pulizzi — Content Inc. 6-Step Model, Tilt, audience-first strategy"
      - "Kristina Halvorson — Content Strategy Quad (Substance, Structure, Workflow, Governance)"
      - "Robert Rose — Content Marketing Operating Model, Intelligent Content"
      - "Ann Handley — Writing GPS 17 steps, Everybody Writes, craft de producao"
      - "Margot Bloomstein — Message Architecture Framework, card sorting de atributos"
      # Narrative & Story
      - "Donald Miller — StoryBrand SB7 Framework, customer-as-hero"
      - "Joseph Campbell — Hero's Journey, Monomyth, estrutura narrativa universal"
      - "Chip & Dan Heath — Made to Stick SUCCESs Framework (Simple, Unexpected, Concrete, Credible, Emotional, Stories)"
      # Viral & Sharing
      - "Jonah Berger — Contagious STEPPS (Social Currency, Triggers, Emotion, Public, Practical Value, Stories)"
      - "Brendan Kane — Hook Point, 3-second rule, pattern interrupt"
      # Platform & Social
      - "Gary Vaynerchuk — Jab Jab Right Hook, context over content, platform-native"
      - "Andy Crestodina — Content Chemistry, Conversion Science, data-driven content"
      # SEO & Discovery
      - "Rand Fishkin — SparkToro, audience research, zero-click content"
      # Content Ops & Governance
      - "Sara Wachter-Boettcher — Structured Content Methodology, content modeling"
      # Trust & Credibility
      - "Rachel Botsman — Distributed Trust Framework, credibilidade digital"
      # Information Architecture
      - "Rosenfeld & Morville — Information Architecture (Polar Bear Book), taxonomia, findability"
      # Creator Economy & Audience
      - "Amanda Natividad — Audience research, zero-click content, SparkToro methodology"
      - "Jay Acunzo — Break the Wheel, unfinished ideas, resonance over reach"
      - "Nicolas Cole — Art and Business of Online Writing, digital writing frameworks"
      # Persuasion (overlap com copywriting)
      - "Eugene Schwartz — Breakthrough Advertising, 5 awareness levels"
      - "Robert Cialdini — Influence, 7 principles of persuasion"
      # Newsletter & Audio
      - "Ann Friedman — Newsletter economics, audience building"
      - "Eric Nuzum — Make Noise, podcast narrative structure"
      # AI Content
      - "Jimmy Daly — Superpath, content ops + AI integration"
    agencies:
      - "Content Marketing Institute — 5-Stage Maturity Model"
      - "HubSpot — Pillar-Cluster Model, Topic Authority"
      - "BuzzSumo — Evergreen Score, Content Characteristics Analysis"
      - "Semrush — SEO Writing Assistant, Topical Authority"
      - "MarketMuse — Topic Cluster Mapping, Content Gap Analysis"
      - "Contently — Expert-in-the-loop signal detection, micro-trend AI"
      - "Valona Intelligence — AI signal detection + human curation"
      - "Morning Brew — Newsletter empire, audience-first content"
      - "The Hustle — Content-to-acquisition pipeline"
      - "Animalz — Long-form B2B content, content moat strategy"
      - "Superpath — Content ops community, AI integration"
      - "Demand Curve — Growth + content integration"
      - "Stacked Marketer — Daily curation + monetization"
      - "Google — E-E-A-T Framework (Experience, Expertise, Authoritativeness, Trustworthiness)"
      - "Parse.ly — Content analytics, audience insights"

  learning:
    preference_tracking: true
    preference_log_path: "preferences/"
    update_trigger: "after each content approval cycle"
    update_agent: "content-governor (Index)"

  task_complexity_levels:
    simple: "Tasks diretas, 1 agente, output unico (ex: write-instagram-caption)"
    medium: "Tasks com co-agents, multiplos steps (ex: create-editorial-calendar)"
    complex: "Tasks com pesquisa, multiplos outputs, decisoes estrategicas (ex: define-big-idea)"
    critical: "Tasks que definem arquitetura editorial ou motor de conteudo (ex: design-content-spine)"

# ══════════════════════════════════════════════════════════════════════════════
# CORE CONCEPTS — Espinha Dorsal & Template Contract System
# ══════════════════════════════════════════════════════════════════════════════

core_concepts:
  content_spine_engine:
    description: >
      Motor central de producao: todo conteudo (qualquer formato, qualquer plataforma)
      parte da mesma Espinha Dorsal — TESE (o que defende), MECANISMO (como funciona),
      PROVA (evidencia), DIRECAO (proximo passo). A Espinha Dorsal e format-agnostic:
      mesma espinha → carrossel, thread, reel, blog, newsletter.
    agent: "content-engineer (Arc)"
    knowledge_base: "content-spine-engine.md"

  template_contract_system:
    description: >
      Sistema de contratos tecnicos por plataforma x formato x template. Cada contrato
      define: numero de blocos/slides, numero de campos textuais, limites de caracteres
      por campo (min/max), regras de formatacao, specs tecnicas. Contratos sao inviolaveis
      — AI DEVE respeitar limites. Versionados para acompanhar mudancas de plataforma.
    agents: ["content-engineer (Arc)", "platform-specialist (Morph)", "content-governor (Index)"]
    knowledge_base: "template-contract-system.md"
    template: "template-contract-registry-template.md"

