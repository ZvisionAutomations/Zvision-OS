workflows:
  - name: full-course-creation
    file: workflows/full-course-creation.yaml
    description: "End-to-end course creation from idea to published course"

  - name: video-course-production
    file: workflows/video-course-production.yaml
    description: "Video-specific workflow: script → record → edit → publish"

  - name: written-course-creation
    file: workflows/written-course-creation.yaml
    description: "Written course: outline → write → design → publish"

  - name: presentation-creation
    file: workflows/presentation-creation.yaml
    description: "Mentoring/workshop presentation: outline → slides → notes → deliver"

  - name: course-launch-cycle
    file: workflows/course-launch-cycle.yaml
    description: "Launch sequence: platform → pricing → sales page → email → launch"

  - name: course-quality-review
    file: workflows/course-quality-review.yaml
    description: "Quality validation cycle before publishing"

