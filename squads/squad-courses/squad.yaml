# CHECKLISTS — 3
# ══════════════════════════════════════════════════════════════════════════════

checklists:
  - name: course-completeness-checklist
    file: checklists/course-completeness-checklist.md
    description: "Validates course has all required components before launch"

  - name: lesson-quality-checklist
    file: checklists/lesson-quality-checklist.md
    description: "Quality check for individual lessons/modules"

  - name: pre-launch-checklist
    file: checklists/pre-launch-checklist.md
    description: "Final validation before publishing on platform"

