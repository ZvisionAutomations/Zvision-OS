# ══════════════════════════════════════════════════════════════════════════════
# CROSS-SQUAD CONNECTIONS
# ══════════════════════════════════════════════════════════════════════════════

cross_squad_connections:
  inbound:
    - from: squad-copy
      receives: "Sales copy for course pages, email sequences, headlines"
    - from: squad-brand
      receives: "Brand guidelines, visual identity for course materials"
    - from: squad-content
      receives: "Content strategy, editorial calendar for course launches"
    - from: squad-research
      receives: "Market research, audience analysis, competitor courses"
    - from: squad-storytelling
      receives: "Narrative structure for course modules, storytelling frameworks"
    - from: squad-design
      receives: "UI/UX for course platforms, design system for materials"
    - from: squad-cloning
      receives: "Cognitive clone KBs as source material for expert courses"

  outbound:
    - to: squad-commercial
      delivers: "Course as product for sales pipeline, pricing models"
    - to: squad-growth
      delivers: "Course as lead magnet, SEO content from course materials"
    - to: squad-paidmedia
      delivers: "Course launch campaign briefs, ad creatives brief"
    - to: squad-copy
      delivers: "Course content for repurposing into copy/headlines"
