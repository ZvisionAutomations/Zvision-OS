# ══════════════════════════════════════════════════════════════════════════════
# SQUAD MANIFEST — squad-storytelling v1.0
# ══════════════════════════════════════════════════════════════════════════════
# World-class narrative & storytelling squad. 10 agents covering mythology,
# screenwriting, pitch, presentations, business storytelling, personal narrative,
# improvisation, and social movements. 47 tasks | 2 workflows | 3 KBs
# ══════════════════════════════════════════════════════════════════════════════

name: squad-storytelling
version: "1.0.0"
description: >
  Squad de 10 mestres da narrativa. Mitologia, screenwriting, pitch,
  apresentacoes, storytelling pessoal, business storytelling, improviso
  e movimentos sociais. Frameworks de Campbell, Harmon, Snyder, Klaff,
  Duarte, Hall, Howell, Johnstone e Ganz reunidos sob um unico
  orquestrador. Atemporal e reutilizavel.
author: Caio Imori
license: MIT
slashPrefix: SINAPSE

metadata:
  created_at: "2026-03-16"
  updated_at: "2026-03-16"
  created_by: "Caio Imori"
  quality_target: "5.0/5.0 em todas as dimensoes"
  agents_count: 10
  tasks_count: 47
  knowledge_bases_count: 3
  workflows_count: 2

# ══════════════════════════════════════════════════════════════════════════════
# QUALITY STANDARDS
# ══════════════════════════════════════════════════════════════════════════════

quality_standards:
  robustness:
    min_agents: 6
    min_tasks: 15
    min_workflows: 2
    min_knowledge_bases: 3
    world_class_references: required

  references:
    authors:
      - "Joseph Campbell — Hero's Journey, Monomyth, 17 stages, archetypes"
      - "Dan Harmon — Story Circle, 8 steps, fractal narrative, TV writing"
      - "Blake Snyder — Save the Cat, 15 beats, 10 genres, The Board"
      - "Oren Klaff — Pitch Anything, STRONG method, frame control, neurofinance"
      - "Nancy Duarte — Resonate, Sparkline, STAR moment, audience as hero"
      - "Kindra Hall — Stories That Stick, 4 story types, Story Gap"
      - "Park Howell — ABT, Story Cycle System, narrative fitness"
      - "Keith Johnstone — Impro, status transactions, Theatresports"
      - "Marshall Ganz — Public Narrative, Story of Self/Us/Now, organizing"
      - "Randy Olson — ABT framework, Houston We Have a Narrative"
      - "Christopher Vogler — The Writer's Journey, adapted Campbell"

