name: squad-paidmedia
version: "1.0.0"
description: >
  Squad de elite para gestao de midia paga cross-channel. Cobre Meta Ads
  (Facebook/Instagram), Google Ads (Search/Display/Shopping/Pmax), CRO
  (conversion optimization), creative strategy e analytics de performance.
  Possui sistema de auditoria de contas, planejamento de budget, scaling
  roadmaps e testing frameworks com rigor estatistico.
author: Caio Imori
license: MIT
slashPrefix: SINAPSE

metadata:
  created_at: "2026-03-16"
  updated_at: "2026-03-16"
  created_by: "squad-creator (Craft)"
  agents_count: 9
  tasks_count: 82
  knowledge_bases_count: 14
  workflows_count: 5
  checklists_count: 4
  templates_count: 5

