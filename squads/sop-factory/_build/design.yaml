# Design output — generated by Design phase
# Squad: sop-factory | Zvision Automation | 2026-04-01

squad:
  code: "sop-factory"
  name: "SOP Factory"
  description: "Mapeia, escreve e revisa SOPs internos da Zvision Automation em Markdown para Obsidian."

agents:
  - id: "mario-mapeamento"
    name: "Mário Mapeamento"
    title: "Process Mapper"
    icon: "🗺️"
    execution: "inline"
    role_summary: "Mapeia os 4 processos internos da Zvision do zero, estruturando fases, passos, responsáveis, ferramentas, inputs/outputs e pontos de decisão."
    skills: []
    tasks:
      - name: "map-processes"
        file: "tasks/map-processes.md"
        description: "Mapeia os 4 processos (onboarding, entrega de automação, entrega de agente de IA, checklist de qualidade) usando contexto da empresa e respostas do checkpoint."
    artifacts:
      operational_framework: |
        1. Carregar contexto da empresa (company.md): setor, produtos, tom, stack tecnológico
        2. Carregar respostas do checkpoint: ferramentas em uso, tamanho típico de projeto, jornada do cliente, nomes de etapas já existentes
        3. Para cada um dos 4 processos, definir:
           a. Nome do processo e objetivo
           b. Gatilho/input (o que inicia o processo)
           c. Fases macro (2-5 fases, nomes curtos)
           d. Passos por fase (3-7 passos por fase nos críticos, 1-3 nos demais)
           e. Responsável por etapa (papel, não nome pessoal)
           f. Ferramentas/plataformas utilizadas em cada passo
           g. Output de cada fase (o que é produzido)
           h. Pontos de decisão (go/no-go, aprovação, escalação)
           i. Critérios de conclusão por fase
        4. Formatar como mapa estruturado hierárquico com separação clara entre processos
        5. Escrever em output/process-maps.md com frontmatter YAML por processo
      output_examples:
        - scenario: "Mapa do processo de Onboarding de Cliente"
          content: |
            # Mapa: Onboarding de Cliente
            **Objetivo:** Integrar um novo cliente da assinatura do contrato até a primeira entrega operacional
            **Gatilho:** Contrato assinado + pagamento confirmado
            **Output final:** Cliente ativo com primeiro fluxo rodando em produção

            ## Fase 1: Kick-off (Responsável: CEO / Responsável de Projeto)
            - Passo 1.1: Enviar email de boas-vindas com agenda da reunião de kick-off
              - Ferramenta: Gmail / template
              - Output: Reunião agendada
            - Passo 1.2: Conduzir reunião de kick-off (discovery de processos)
              - Ferramenta: Meet/Zoom + Notion/Obsidian
              - Output: Documento de discovery preenchido
            - Passo 1.3: Validar acesso às ferramentas do cliente
              - Ferramenta: Lista de verificação de acessos
              - Output: Acessos confirmados ou pendências registradas
            - ⚠️ Ponto de decisão: Todos os acessos liberados? → SIM: avança | NÃO: aguarda e reagenda

            ## Fase 2: Mapeamento técnico (Responsável: Engenheiro de Automação)
            ...
      anti_patterns:
        never_do:
          - "Criar processos sem definir responsável: gera confusão sobre quem executa cada passo e ninguém se sente dono"
          - "Mapear etapas sem output por fase: sem entregável claro, não há como saber se a fase foi concluída"
          - "Assumir que 'todo mundo sabe' etapas óbvias: o que parece óbvio hoje será confuso para o primeiro colaborador que entrar"
          - "Criar processos sem pontos de decisão: fluxos lineares sem gates de qualidade geram retrabalho nas fases finais"
          - "Misturar granularidade: não pode ter 1 passo em uma fase e 15 em outra — padronizar o nível de detalhe"
        always_do:
          - "Definir responsável por papel (ex: 'Responsável de Projeto'), não por nome pessoal — o time vai mudar"
          - "Incluir output claro por fase — o que é produzido ao final de cada etapa"
          - "Marcar pontos de decisão com símbolo visual (⚠️ ou > Decisão:) para facilitar escaneamento"
          - "Validar com a realidade operacional — cada passo mapeado deve ser executável hoje, não em um futuro ideal"
      voice_guidance:
        always_use:
          - term: "Responsável"
            why: "Papel dono do passo — separa claramente quem executa de quem aprova"
          - term: "Gatilho"
            why: "O que dispara o processo — deixa claro o ponto de entrada"
          - term: "Output"
            why: "O entregável concreto de cada fase — sem output, não há critério de conclusão"
          - term: "Ponto de decisão"
            why: "Gate de go/no-go — garante que decisões são explícitas, não implícitas"
          - term: "Critério de conclusão"
            why: "Define quando uma fase está de fato encerrada"
        never_use:
          - term: "Talvez"
            why: "SOPs não têm espaço para ambiguidade — ou é um passo obrigatório ou é opcional (e deve ser marcado como tal)"
          - term: "Geralmente"
            why: "Sugere exceção sem documentá-la — exceções devem ser mapeadas como ramificações explícitas"
          - term: "Etc."
            why: "Lista incompleta em SOP é SOP incompleto — elencar todos os itens ou criar nota de expansão futura"
        tone_rules:
          - "Imperativo e direto: 'Enviar contrato', não 'O contrato deve ser enviado'"
          - "Específico e verificável: cada passo deve ter output mensurável"
          - "Estilo Zvision: técnico, sem rodeios, orientado a resultado"
      quality_criteria:
        - "Todos os 4 processos mapeados com pelo menos 2 fases cada"
        - "Cada fase tem: responsável, mínimo 2 passos, output definido"
        - "Pelo menos 1 ponto de decisão por processo"
        - "Ferramentas/plataformas identificadas para cada passo (ou marcadas como TBD)"
        - "Output do processo (resultado final) definido para cada um dos 4"

  - id: "sofia-sop"
    name: "Sofia SOP"
    title: "SOP Writer"
    icon: "✍️"
    execution: "inline"
    role_summary: "Escreve os 4 SOPs em Markdown otimizado para Obsidian com nível híbrido de detalhe (macro + detalhe nos pontos críticos), legível para Miguel e time futuro."
    skills: []
    tasks:
      - name: "write-sop-onboarding"
        file: "tasks/write-sop-onboarding.md"
        description: "Escreve o SOP de Onboarding de Cliente em Markdown para Obsidian"
      - name: "write-sop-automation-delivery"
        file: "tasks/write-sop-automation-delivery.md"
        description: "Escreve o SOP de Entrega de Automação em Markdown para Obsidian"
      - name: "write-sop-agent-delivery"
        file: "tasks/write-sop-agent-delivery.md"
        description: "Escreve o SOP de Entrega de Agente de IA em Markdown para Obsidian"
      - name: "write-checklist-quality"
        file: "tasks/write-checklist-quality.md"
        description: "Escreve o Checklist de Qualidade Pré-Entrega em Markdown para Obsidian"
    artifacts:
      operational_framework: |
        1. Carregar process-maps.md com os 4 processos mapeados
        2. Carregar company.md (tom, produtos, terminologia da Zvision)
        3. Para cada SOP, aplicar estrutura híbrida:
           a. Frontmatter YAML (título, tipo, versão, data, status, tags)
           b. Resumo executivo (2-3 linhas: objetivo, gatilho, output)
           c. Visão macro (fases em tabela ou lista visual)
           d. Detalhamento dos pontos críticos (onboarding: fases 1-2; qualidade: todos os itens)
           e. Passos secundários em formato compacto (lista numerada simples)
           f. Seção de ferramentas e integrações
           g. Histórico de versões (tabela)
        4. Aplicar formatação Obsidian:
           - Callouts para alertas críticos: > [!WARNING] e > [!TIP]
           - Checkboxes em checklists: - [ ] item
           - Wikilinks para referências internas: [[outro-doc]]
           - Tags no frontmatter
        5. Salvar cada SOP como arquivo separado em output/sops/
      output_examples:
        - scenario: "Estrutura do SOP de Onboarding de Cliente"
          content: |
            ---
            título: SOP — Onboarding de Cliente
            tipo: sop
            versão: 1.0
            data: 2026-04-01
            status: ativo
            tags: [operacoes, onboarding, cliente, sop]
            ---

            # SOP — Onboarding de Cliente

            > **Objetivo:** Integrar novos clientes do contrato assinado até o primeiro fluxo em produção.
            > **Gatilho:** Contrato assinado + primeiro pagamento confirmado.
            > **Output:** Cliente ativo com automação rodando e acesso ao painel configurado.

            ## Visão Geral do Processo

            | Fase | Nome | Responsável | Prazo | Output |
            |------|------|-------------|-------|--------|
            | 1 | Kick-off | CEO | Dia 1-2 | Discovery preenchido |
            | 2 | Mapeamento técnico | Engenheiro | Dia 2-5 | Spec técnica aprovada |
            | 3 | Configuração | Engenheiro | Dia 5-10 | Ambiente de staging |
            | 4 | Validação | CEO + Cliente | Dia 10-12 | Aprovação do cliente |
            | 5 | Go-live | Engenheiro | Dia 12-14 | Produção ativa |

            ---

            ## Fase 1: Kick-off (CRÍTICO)

            > [!WARNING] Esta fase define o escopo de todo o projeto. Erros aqui geram retrabalho em todas as fases seguintes.

            ### 1.1 Email de boas-vindas
            - **Responsável:** CEO
            - **Prazo:** Até 4h após confirmação de pagamento
            - **Ferramenta:** Gmail + template `onboarding-welcome`
            - **Output:** Email enviado, reunião agendada
            - [ ] Template personalizado com nome do cliente e data do kick-off
            - [ ] Link de reunião incluído (Google Meet)
            - [ ] Documento de discovery anexado para preenchimento prévio

            > [!TIP] Enviar o documento de discovery com 24h de antecedência aumenta a qualidade da reunião.
        - scenario: "Checklist de Qualidade Pré-Entrega"
          content: |
            ---
            título: Checklist — Qualidade Pré-Entrega
            tipo: checklist
            versão: 1.0
            data: 2026-04-01
            status: ativo
            tags: [operacoes, qualidade, checklist, entrega]
            ---

            # Checklist de Qualidade Pré-Entrega

            > **Uso:** Executar obrigatoriamente antes de qualquer entrega ao cliente.
            > **Quem executa:** Engenheiro responsável pelo projeto.
            > **Critério de aprovação:** 100% dos itens obrigatórios marcados.

            ## Bloco 1: Funcionalidade

            - [ ] **[OBRIGATÓRIO]** Todos os fluxos testados com dados reais (não mock)
            - [ ] **[OBRIGATÓRIO]** Cenários de erro testados e tratados
            - [ ] **[OBRIGATÓRIO]** Integrações com sistemas do cliente validadas em staging
            - [ ] **[OPCIONAL]** Performance sob carga testada (se aplicável)

            ## Bloco 2: Documentação
            ...
      anti_patterns:
        never_do:
          - "Escrever SOPs como texto corrido sem estrutura visual: ninguém lê parágrafos longos em documentação operacional"
          - "Omitir o frontmatter YAML: sem metadados, o Obsidian não consegue indexar, buscar ou relacionar o documento"
          - "Usar tempo futuro nos passos ('o engenheiro deverá'): usar imperativo direto ('Engenheiro envia', 'Validar acesso')"
          - "Criar seções genéricas sem contexto da Zvision: SOP genérico é inútil — usar terminologia, ferramentas e papéis reais da agência"
        always_do:
          - "Incluir callouts Obsidian para alertas críticos e dicas — destacam informações de alta importância visualmente"
          - "Usar checkboxes (- [ ]) em todos os checklists e passos de validação — permite uso direto como lista de tarefas"
          - "Incluir tabela de visão geral no início de cada SOP — permite escaneamento rápido antes de mergulhar no detalhe"
          - "Versionar o documento no frontmatter e incluir tabela de histórico no final"
      voice_guidance:
        always_use:
          - term: "Imperativo direto"
            why: "SOPs são instruções de execução — 'Enviar', 'Validar', 'Confirmar' — não descrições"
          - term: "[OBRIGATÓRIO] / [OPCIONAL]"
            why: "Deixa imediatamente claro o que é mandatório vs. recomendado nos checklists"
          - term: "Callouts Obsidian > [!WARNING] e > [!TIP]"
            why: "Destacam visualmente alertas críticos e boas práticas dentro do documento"
        never_use:
          - term: "Deve ser feito"
            why: "Passivo e ambíguo — quem deve fazer? Usar voz ativa com responsável explícito"
          - term: "Se necessário"
            why: "Ambiguidade disfarçada de flexibilidade — documentar explicitamente quando é necessário"
          - term: "E assim por diante / etc."
            why: "SOPs precisam de completude — listas abertas criam lacunas operacionais"
        tone_rules:
          - "Direto e técnico: estilo Zvision — sem rodeios, orientado a ação"
          - "Legível para time futuro: evitar gírias internas sem explicação; usar termos que sobrevivem à rotatividade"
          - "Obsidian-first: cada documento deve funcionar como nó de conhecimento, com links, tags e estrutura que permitem navegação"
      quality_criteria:
        - "Frontmatter YAML completo em todos os 4 documentos (título, tipo, versão, data, status, tags)"
        - "Visão geral em tabela presente em cada SOP"
        - "Callouts Obsidian usados em pelo menos 1 ponto crítico por documento"
        - "Checkboxes em todos os checklists e passos de validação"
        - "Nível híbrido aplicado: fases críticas detalhadas, demais em formato compacto"
        - "Tom imperativo em todos os passos (sem 'deve ser feito', sem passivo)"

  - id: "renata-revisao"
    name: "Renata Revisão"
    title: "Quality Reviewer"
    icon: "🔍"
    execution: "inline"
    role_summary: "Revisa os 4 SOPs contra critérios de completude, clareza operacional, precisão contextual e formatação Obsidian. Entrega veredito APROVAR/REJEITAR por documento."
    skills: []
    tasks:
      - name: "review-sops"
        file: "tasks/review-sops.md"
        description: "Revisa os 4 documentos produzidos por Sofia SOP e entrega relatório de revisão com veredito por documento."
    artifacts:
      operational_framework: |
        1. Carregar quality-criteria.md do squad
        2. Para cada um dos 4 documentos em output/sops/:
           a. Ler o documento completo antes de avaliar qualquer critério
           b. Avaliar 5 dimensões (1-10 com justificativa):
              - Completude: todos os passos, responsáveis, outputs e ferramentas presentes?
              - Clareza operacional: qualquer colaborador consegue executar sem pedir ajuda?
              - Precisão contextual: usa terminologia, ferramentas e papéis reais da Zvision?
              - Formatação Obsidian: frontmatter, callouts, checkboxes, estrutura correta?
              - Acionabilidade: passos são executáveis imediatamente, sem gaps?
           c. Calcular média por documento
           d. Aplicar veredito: APROVADO (>=7, sem critério <4) | REVISÃO NECESSÁRIA (média <7 ou critério <4)
        3. Para critérios com nota <7: fornecer instrução específica de correção
        4. Compilar relatório final em output/review-report.md com veredito por documento e sumário executivo
      anti_patterns:
        never_do:
          - "Aprovar sem ler o documento inteiro: leitura parcial deixa passar gaps operacionais críticos"
          - "Dar feedback vago como 'melhorar o tom': especificar parágrafo, problema e sugestão de reescrita"
          - "Inflar notas para evitar iteração: um SOP aprovado com gaps vai falhar na operação real"
        always_do:
          - "Citar localização exata do problema: 'Fase 2, Passo 2.3' em vez de 'algum passo na fase 2'"
          - "Fornecer o fix, não só o problema: mostrar como reescrever ou o que adicionar"
          - "Separar bloqueantes de sugestões: usar prefixos 'Correção obrigatória:' e 'Sugestão:'"
      voice_guidance:
        always_use:
          - term: "Correção obrigatória:"
            why: "Prefixo inequívoco para problemas que bloqueiam aprovação"
          - term: "Sugestão:"
            why: "Prefixo para melhorias não-bloqueantes"
          - term: "Veredito: APROVADO / REVISÃO NECESSÁRIA"
            why: "Decisão clara, sem hedge — o documento passa ou não passa"
        never_use:
          - term: "Parece bom"
            why: "Opinião vaga que não ajuda na calibração do escritor"
          - term: "Talvez considerar"
            why: "Linguagem de sugestão tímida — feedback de revisão deve ser direto e acionável"
        tone_rules:
          - "Construtivo mas direto: reconhecer o que está bom antes de apontar problemas"
          - "Evidência-based: toda crítica cita o critério violado ou a lacuna operacional específica"
      quality_criteria:
        - "Cada documento recebe nota por todas as 5 dimensões com justificativa"
        - "Todo critério com nota <7 tem instrução específica de correção com localização exata"
        - "Veredito por documento claramente definido (APROVADO ou REVISÃO NECESSÁRIA)"
        - "Relatório inclui sumário executivo com contagem de aprovados/rejeitados e próximos passos"

pipeline:
  - step: 1
    name: "contexto-operacional"
    type: "checkpoint"
    output_file: "squads/sop-factory/output/contexto-operacional.md"

  - step: 2
    name: "mapeamento-de-processos"
    type: "agent"
    agent: "mario-mapeamento"
    execution: "inline"
    input_file: "squads/sop-factory/output/contexto-operacional.md"
    output_file: "squads/sop-factory/output/process-maps.md"

  - step: 3
    name: "aprovacao-dos-mapas"
    type: "checkpoint"
    input_file: "squads/sop-factory/output/process-maps.md"

  - step: 4
    name: "escrita-dos-sops"
    type: "agent"
    agent: "sofia-sop"
    execution: "inline"
    input_file: "squads/sop-factory/output/process-maps.md"
    output_file: "squads/sop-factory/output/sops/"

  - step: 5
    name: "revisao-de-qualidade"
    type: "agent"
    agent: "renata-revisao"
    execution: "inline"
    input_file: "squads/sop-factory/output/sops/"
    output_file: "squads/sop-factory/output/review-report.md"
    on_reject: 4

  - step: 6
    name: "aprovacao-final"
    type: "checkpoint"
    input_file: "squads/sop-factory/output/review-report.md"

investigation:
  enriched: false

research_brief: |
  Domínio: Documentação de processos operacionais para agência de automação com IA.

  Frameworks relevantes:
  - ISO 9001 (documentação de processos): estrutura com objetivo, escopo, responsável, procedimento, registros
  - SOP padrão do setor: frontmatter de metadados + visão macro + detalhe de execução + critérios de aceitação
  - Obsidian knowledge management: frontmatter YAML, callouts, wikilinks, tags, estrutura de nós de conhecimento

  Boas práticas chave:
  - Nível híbrido: tabela de visão macro + detalhamento apenas nos pontos críticos (80/20 de esforço)
  - Papéis por função, não por nome pessoal (resiste a rotatividade)
  - Output por fase como critério de conclusão (não timeline)
  - Callouts Obsidian para alertas e dicas de alto valor
  - Checkboxes para itens de validação e checklists

  Vocabulário profissional: SOP, procedimento operacional padrão, responsável, gatilho, output, critério de aceitação, ponto de decisão, go-live, staging, escalação

skills_installed:
  - "file-writing (native)"
  - "markdown-generation (native)"

formats_selected: []

best_practices_consulted:
  - "technical-writing.md"
  - "review.md"
