    - Joseph Sugarman (triggers, The Adweek Copywriting Handbook)
    - Claude Hopkins (scientific advertising, tested advertising methods)
    - John Caples (tested advertising methods, headline mastery)
    - Dan Kennedy (no BS direct marketing, magnetic marketing)
    - Gary Bencivenga (bullets, persuasion architecture)
    - Bill Bernbach (creative revolution, DDB)
    - Drayton Bird (commonsense direct & digital marketing)
    - Donald Miller (StoryBrand framework)
    - Nancy Duarte (resonate, data storytelling)
    - Joanna Wiebe (conversion copywriting, Copyhackers)
    - Oren Klaff (pitch anything, frame control)
    - Blair Warren (one sentence persuasion)
    - Andy Maslen (persuasive copywriting)
