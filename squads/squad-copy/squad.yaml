    - Basecamp/37signals (concise product copy)

  core_concepts:
    - name: "Persuasion Architecture"
      description: >
        Todo copy segue uma arquitetura de persuasão em 5 camadas:
        1. ATTENTION (capturar em 3 segundos)
        2. INTEREST (gerar curiosidade com relevância)
        3. DESIRE (ativar emoção + lógica)
        4. CONVICTION (eliminar objeções + prova social)
        5. ACTION (CTA claro com urgência legítima)
        Cada camada tem técnicas específicas e métricas de sucesso.

    - name: "Market Awareness Spectrum"
      description: >
        Eugene Schwartz: o copy muda COMPLETAMENTE baseado no nível de consciência do leitor.
        5 níveis: UNAWARE (não sabe que tem problema) → PROBLEM AWARE (sente a dor) →
        SOLUTION AWARE (sabe que soluções existem) → PRODUCT AWARE (conhece nosso produto) →
        MOST AWARE (pronto para comprar). Copy para UNAWARE é storytelling.
        Copy para MOST AWARE é oferta direta. Errar o nível = copy ineficaz.

    - name: "Emotional-Rational Bridge"
      description: >
        Kahneman + Cialdini: pessoas decidem com System 1 (emocional, rápido, intuitivo)
        e justificam com System 2 (racional, lento, analítico). O copy world-class
        ativa System 1 PRIMEIRO (emoção, storytelling, social proof) e depois
        fornece System 2 (dados, ROI, comparações) para justificar a decisão
        já tomada emocionalmente. A ponte entre os dois é a arte do copywriting.

