name: squad-animations
version: "1.0.0"
description: >
  Squad de elite para criacao de animacoes web de altissima qualidade.
  Cobre CSS, JavaScript, Three.js, GLSL shaders, scroll-driven animations,
  page transitions, particulas, point clouds, generative art e motion design.
  Possui sistema de interpretacao de prompts que traduz descricoes vagas
  em especificacoes tecnicas precisas, eliminando a necessidade de iteracao.
author: Caio Imori
license: MIT
slashPrefix: SINAPSE

metadata:
  created_at: "2026-03-15"
  updated_at: "2026-03-15"
  created_by: "squad-creator (Craft)"
  agents_count: 9
  tasks_count: 73
  knowledge_bases_count: 13
  workflows_count: 5
  checklists_count: 3
  templates_count: 5

