    - Deque Systems (axe-core, accessibility testing)
    - W3C WAI (WCAG, ARIA, design tokens spec)

  core_concepts:
    - name: "Double Diamond"
      description: >
        Design Council framework: Discover (diverge) → Define (converge) →
        Develop (diverge) → Deliver (converge). Garante que o problema certo
        e resolvido antes de projetar a solucao certa.

    - name: "Atomic Design"
      description: >
        Brad Frost: componentes organizados em 5 niveis — Atoms (elementos basicos),
        Molecules (grupos simples), Organisms (secoes complexas), Templates (layouts),
        Pages (instancias reais). Cada nivel compoe o proximo.

    - name: "Three-Tier Token Architecture"
      description: >
        Design tokens em 3 camadas: Primitive (color.blue.500 = #0066CC),
        Semantic (color.action.primary = {color.blue.500}),
        Component (button.bg.default = {color.action.primary}).
        Permite multi-brand, dark mode e escalabilidade.

    - name: "Core Web Vitals"
      description: >
        Metricas do Google que definem experiencia do usuario: LCP < 2.5s
        (loading), INP < 200ms (interatividade), CLS < 0.1 (estabilidade visual).
        Gate obrigatorio — nenhuma pagina ship sem passar.

    - name: "WCAG 2.2 Level AA"
      description: >
        87 criterios de acessibilidade. Gate obrigatorio legal (EU EAA desde
        junho 2025). Todo componente e pagina DEVE passar. Inclui 9 novos
        criterios do WCAG 2.2 (target size, focus appearance, accessible auth).

  mandatory_quality_gates:
    - name: "Accessibility Gate"
      owner: dx-accessibility-specialist
      criteria: "WCAG 2.2 AA compliance — all 87 criteria"
      verdict: "PASS / CONDITIONAL / FAIL"
      blocking: true

    - name: "Performance Gate"
      owner: dx-performance-engineer
      criteria: "LCP < 2.5s, INP < 200ms, CLS < 0.1, Lighthouse >= 90"
      verdict: "CERTIFIED / EXCEEDS BUDGET / FAIL"
      blocking: true

