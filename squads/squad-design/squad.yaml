cross_squad_connections:
  inbound:
    - from: squad-brand
      receives: brand tokens (colors, typography, spacing), motion language, visual guidelines
    - from: squad-copy
      receives: approved copy, CTA text, form labels, error messages, microcopy
    - from: squad-content
      receives: content strategy, content types, content hierarchy, SEO briefs
    - from: squad-research
      receives: user research data, personas, market insights, competitive analysis

  outbound:
    - to: squad-growth
      delivers: implemented pages (UTM-ready, tracking hooks), performance-certified
    - to: squad-product
      delivers: component library (Storybook), design tokens, API integration patterns
    - to: squad-copy
      delivers: UI copy specs (character limits, truncation behavior, responsive variants)
    - to: squad-brand
      delivers: token implementation feedback, edge cases, dark mode issues
