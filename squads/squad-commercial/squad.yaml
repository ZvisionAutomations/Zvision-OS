quality_standards:
  reference_authors:
    - "Aaron Ross (Predictable Revenue)"
    - "Jacco van der Kooij (Revenue Architecture)"
    - "Alex Hormozi ($100M Offers)"
    - "Mark Roberge (Sales Acceleration Formula)"
    - "Nick Mehta & Lincoln Murphy (Customer Success)"
    - "Brent Adamson & Matt Dixon (The Challenger Sale)"
    - "Blair Enns (Pricing Creativity, Win Without Pitching)"
    - "April Dunford (Obviously Awesome)"
    - "Russell Brunson (DotCom Secrets)"
    - "David Skok (For Entrepreneurs — SaaS Metrics)"
    - "Jason Lemkin (SaaStr)"
    - "Ron Baker (Value Pricing)"
    - "Neil Rackham (SPIN Selling)"
    - "Fred Reichheld (NPS, Loyalty Effect)"
    - "David Maister (Trusted Advisor)"

  reference_companies:
    - "Salesforce (CRM, Revenue Cloud)"
    - "HubSpot (Inbound CRM, Marketing Hub)"
    - "Gong (Revenue Intelligence)"
    - "Gainsight (Customer Success Platform)"
    - "Clari (Revenue Operations)"
    - "Outreach (Sales Engagement)"
    - "ClickFunnels (Funnel Building)"
    - "Stripe (Revenue Analytics)"
    - "PandaDoc (Proposals & CPQ)"
    - "Apollo.io (Prospecting)"

  core_concepts:
    - name: "Predictable Revenue"
      description: "Separacao de funcoes (SDR/AE/CS) para pipeline escalavel"
    - name: "MEDDIC/MEDDPICC"
      description: "Framework de qualificacao: Metrics, Economic Buyer, Decision Criteria/Process, Identify Pain, Champion"
    - name: "Bow Tie Funnel"
      description: "Extensao do funil tradicional para incluir retencao, expansao e advocacy"
    - name: "Value Equation (Hormozi)"
      description: "(Dream Outcome × P(Achievement)) / (Time Delay × Effort)"
    - name: "Customer Health Score"
      description: "Composite score preditor de churn/expansion baseado em usage, satisfaction, outcomes"

  mandatory_gates:
    - name: "Deal Qualification Gate"
      description: "MEDDPICC score >= 10/16 antes de enviar proposta"
      blocking: true
      agent: cs-crm-specialist

    - name: "Proposal Quality Gate"
      description: "Three-options, value framing, social proof, risk reversal obrigatorios"
      blocking: true
      agent: cs-offer-designer

cross_squad_handoffs:
  inbound:
    - from: squad-growth
      receives: "Lead scoring data, conversion analytics, campaign performance, attribution data"
    - from: squad-content
      receives: "TOFU/MOFU/BOFU content assets, case studies, sales enablement content"
    - from: squad-copy
      receives: "Proposal copy, email sequences, landing page copy, objection handling scripts"
    - from: squad-brand
      receives: "Brand guidelines for proposals, presentation templates, messaging framework"
    - from: squad-design
      receives: "Landing pages, conversion-optimized pages, UX insights"

  outbound:
    - to: squad-growth
      sends: "Pipeline data, win/loss intelligence, ICP feedback, funnel requirements"
    - to: squad-content
      sends: "Content briefs for funnel stages, objection-based content requests, win stories"
    - to: squad-copy
      sends: "Proposal copy briefs, email sequence requirements, case study raw data"
    - to: squad-product
      sends: "Feature requests, client feedback, expansion blockers, NPS verbatims"
    - to: squad-commercial
      sends: "Tech stack requirements, process automation needs, reporting requirements"

preferences:
  file: preferences/README.md
