quality_standards:
  reference_authors:
    - "Marty Cagan (Inspired, Empowered, Transformed)"
    - "Teresa Torres (Continuous Discovery Habits)"
    - "Melissa Perri (Escaping the Build Trap)"
    - "Eric Ries (The Lean Startup)"
    - "Ryan Singer (Shape Up)"
    - "Bob Moesta (Demand-Side Sales, JTBD)"
    - "Jeff Patton (User Story Mapping)"
    - "Rich Mironov (Art of Product Management)"
    - "Roman Pichler (Strategize)"
    - "Gibson Biddle (ex-Netflix, PM leadership)"
    - "Sean Ellis (Hacking Growth, PMF Test)"
    - "Andrew Chen (The Cold Start Problem)"
    - "Noriaki Kano (Kano Model)"
    - "Martin Fowler (Technical Debt Quadrant)"
    - "John Doerr (Measure What Matters — OKRs)"

  reference_companies:
    - "ProductBoard (Requirements + Roadmapping)"
    - "Amplitude (Product Analytics)"
    - "Mixpanel (Event-Based Analytics)"
    - "Pendo (In-App Guidance)"
    - "LaunchDarkly (Feature Flags)"
    - "Linear (Issue Tracking)"
    - "Intercom (JTBD applied)"
    - "Basecamp/37signals (Shape Up)"
    - "Canny (Client Request Management)"
    - "FullStory/Hotjar (Session Recording)"

  core_concepts:
    - name: "Dual-Track Agile"
      description: "Discovery Track (validacao continua) + Delivery Track (construcao de solucoes validadas)"
    - name: "Opportunity Solution Tree"
      description: "Desired Outcome → Opportunities → Solutions → Experiments (Teresa Torres)"
    - name: "RICE Scoring"
      description: "(Reach × Impact × Confidence) / Effort — priorizacao quantitativa"
    - name: "Product-Market Fit"
      description: "Sean Ellis Test: >40% Very Disappointed = PMF achieved"
    - name: "Shape Up"
      description: "6-week cycles, appetite-based scoping, fixed time variable scope"

  mandatory_gates:
    - name: "Discovery Entry Gate"
      description: "Problema validado com evidencia antes de qualquer solucao entrar em delivery"
      blocking: true
      agent: ps-discovery-lead

    - name: "Launch Go/No-Go Gate"
      description: "Feature 100% AC passing + analytics instrumentados + rollback plan antes de producao"
      blocking: true
      agent: ps-delivery-manager

cross_squad_handoffs:
  inbound:
    - from: squad-commercial
      receives: "Client feedback, NPS verbatims, feature requests, expansion signals"
    - from: squad-research
      receives: "Market analysis, competitive intelligence, user research data"
    - from: squad-design
      receives: "UX designs, design system components, accessibility audit"

  outbound:
    - to: squad-commercial
      sends: "Resource needs, sprint capacity forecasts, process automation requests"
    - to: squad-design
      sends: "Discovery opportunities for UX, product specs for UI design"
    - to: squad-content
      sends: "Content strategy briefs, launch content needs"
    - to: squad-commercial
      sends: "Product metrics for QBR, feature adoption data for expansion"
    - to: squad-research
      sends: "Research briefs requiring deep analysis"

preferences:
  file: preferences/README.md

