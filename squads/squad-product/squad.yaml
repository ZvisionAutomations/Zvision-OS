name: squad-product
version: "1.0.0"
slashPrefix: SINAPSE
author: Caio Imori
license: UNLICENSED
description: >
  Squad de Product Systems — orquestra discovery, delivery, analytics e product operations
  para agencias que constroem produtos digitais. Cada feature e validada antes de ser
  construida, cada lancamento e instrumentado, cada handoff e completo.

