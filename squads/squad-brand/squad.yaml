# ══════════════════════════════════════════════════════════════════════════════
# BRAND VALUE TRACKER — INTEGRATED VALUATION SYSTEM ★ NEW v3.0
# ══════════════════════════════════════════════════════════════════════════════

brand_value_tracker:
  description: >
    Sistema integrado de valuacao de marca que calcula brand equity em cada fase
    de entrega, demonstrando ROI tangivel ao cliente. Metodologia hibrida baseada
    em Interbrand, Keller CBBE, e BAV.
  agent: brand-growth-strategist (Catalyst)
  methodology:
    - Cost-Based Valuation (custo de recriar do zero)
    - Brand Strength Score (10 dimensoes, 0-100)
    - CBBE Score (4 niveis de Keller, 0-100)
    - Royalty Relief (para empresas com receita)
  phases_tracked:
    - baseline: "Antes do projeto — valor inicial"
    - phase_1_strategy: "Apos estrategia — posicionamento, manifesto, voz"
    - phase_2_visual: "Apos visual — logo, cores, tipografia, moodboard"
    - phase_3_assets: "Apos assets — mockups, templates, colaterais"
    - phase_4_system: "Apos system — tokens, componentes, motion, audio"
    - phase_5_final: "Entrega final — brandbook compilado, governance"
  output_format:
    - "brand-valuation-report-phase-{N}.md"
    - "roi-dashboard-data.json (para frontend)"
    - "brand-roi-report.md (relatorio executivo)"

