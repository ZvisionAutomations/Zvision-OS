# SQUAD MANIFEST — squad-brand v3.2
# ══════════════════════════════════════════════════════════════════════════════
# The world-class brand system squad for creating, managing and evolving
# complete brand systems — from strategic positioning to compiled brandbook.
# 15 agents | 97 tasks | 4 workflows | 19 KBs | 6 templates | Full coverage
# ══════════════════════════════════════════════════════════════════════════════

name: squad-brand
version: 3.2.0
description: >
  Squad de classe mundial para criacao, gestao e evolucao de sistemas de marca
  completos. 15 agentes especialistas cobrindo 100% de um brand system world-class:
  estrategia, identidade visual, brand equity & growth, cultura de marca, assets
  criativos, colateral corporativo, design system, motion, sonic branding, auditoria
  e compilacao. Inclui Brand Value Tracker, illustration system, brand characters,
  e preference tracking para auto-learning progressivo.
  v3.2: +3 tasks (illustration system, brand characters, preference tracking)
  + 1 KB (illustration styles) + 1 template (preference log) + quality_standards.
  Atemporal e reutilizavel.
author: Caio Imori
license: UNLICENSED
slashPrefix: SINAPSE

metadata:
  created_at: "2026-03-11"
  updated_at: "2026-03-13"
  created_by: "squad-creator (Craft)"
  blueprint: "squads/.designs/squad-brand-design.yaml"
  quality_target: "5.0/5.0 em todas as dimensoes"
  agents_count: 15
  tasks_count: 97
  knowledge_bases_count: 19
  checklists_count: 3
  templates_count: 6
  workflows_count: 4
  total_files: 143

# ══════════════════════════════════════════════════════════════════════════════
# QUALITY STANDARDS — Regras de Robustez (v3.2)
# ══════════════════════════════════════════════════════════════════════════════

quality_standards:
  robustness:
    min_agents: 6
    min_tasks: 50
    min_workflows: 3
    min_knowledge_bases: 8
    min_checklists: 2
    min_templates: 3
    world_class_references: required
    gap_audit: required
    preference_tracking: required

  references:
    authors:
      - "Kapferer — Brand Identity Prism, 6-facet model"
      - "Keller — CBBE Pyramid, brand resonance"
      - "Aaker — Brand Identity System, brand personality"
      - "Sharp — How Brands Grow, 7 Rules, mental/physical availability"
      - "Neumeier — Onlyness, Zag, brand gap"
      - "Lindstrom — Brand Sense, 5 senses, sensory branding"
      - "Romaniuk — Distinctive Assets, Category Entry Points"
      - "Yohn — Brand-Culture Fusion, Fusion Framework"
      - "Hofstede — Cultural Dimensions, 6D model"
      - "Erin Meyer — Culture Map, 8 scales"
      - "Sinek — Golden Circle, Start With Why"
      - "Wheeler — 5-Phase Process, brand identity design"
      - "Ries & Trout — Positioning Laws, 22 rules"
      - "Aradhna Krishna — Sensory Marketing"
      - "Marieke de Mooij — Global Marketing, cultural advertising"
    agencies:
      - "Pentagram"
      - "Wolff Olins"
      - "Landor"
      - "Collins"
      - "Interbrand"
      - "JKR (Jones Knowles Ritchie)"
      - "Lippincott"
      - "FutureBrand"
      - "Ragged Edge"

  learning:
    preference_tracking: true
    preference_log_path: "preferences/"
    update_trigger: "after each client approval cycle"
    update_agent: "brand-auditor (Sentinel)"

  task_complexity_levels:
    simple: "Tasks diretas, 1 agente, output unico"
    medium: "Tasks com co-agents, multiplos steps"
    complex: "Tasks com pesquisa, multiplos outputs, decisoes estrategicas"
    critical: "Tasks que definem posicionamento ou identidade central da marca"

